<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Mamamatcha</title>
    <meta
      name="description"
      content="Login Mamamatcha untuk masuk ke halaman utama customer atau dashboard admin menggunakan satu form praktis."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-brand-panel">
        <a href="login.html" class="brand login-logo" aria-label="Mamamatcha login">
          <span class="brand-mark">M</span>
          <span>Mamamatcha</span>
        </a>
        <div>
          <p class="eyebrow">Fresh matcha daily</p>
          <h1>Selamat datang di Mamamatcha, silakan login dulu sebelum masuk.</h1>
          <p class="hero-text">
            Masukkan nama atau email beserta password kamu untuk melanjutkan pemesanan matcha favoritmu.
          </p>
        </div>
        <img src="assets/hero-matcha.svg" alt="Tiga cup Mamamatcha" />
      </section>

      <section class="login-card" aria-label="Form login Mamamatcha">
        <!-- FORM TUNGGAL -->
        <form class="login-form active" id="mamamatcha-unified-form">
          <div>
            <p class="eyebrow">Selamat Datang</p>
            <h2>Login Akun</h2> 
            <p>Masukkan identitas dan password Anda untuk melanjutkan.</p>
          </div>
          
          <label for="login-identity">Nama / Email</label>
          <input id="login-identity" name="identity" type="text" placeholder="Nama atau email kamu" required />
          
          <label for="login-password">Password</label>
          <!-- Menggunakan SVG Ikon Mata di dalam Button -->
          <div class="password-wrapper" style="position: relative; width: 100%;">
            <input id="login-password" name="password" type="password" placeholder="Masukkan password" required style="padding-right: 45px;" />
            <button id="toggle-password-btn" class="password-toggle" type="button" style="position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; padding: 0; cursor: pointer; color: #657062; display: flex; align-items: center;">
              <!-- Gambar Ikon Mata Bawaan -->
              <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 22px; height: 22px;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
              </svg>
            </button>
          </div>
          
          <button class="btn btn-primary" type="submit" style="margin-top: 14px;">Masuk ke Aplikasi</button>
          
          <p class="form-message" id="login-message" aria-live="polite" style="margin-top: 10px; font-weight: bold;"></p>
        </form>
      </section>
    </main>

    <script src="login.js"></script>
  </body>
</html>
